name: CI/CD Python DevOps Lab

run-name: "CI/CD ejecutado por ${{ github.actor }} en ${{ github.ref_name }}"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Python application
    runs-on: ubuntu-latest

    outputs:
      build_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ env.PYTHON_VERSION }}-
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest -q --cov=hello --cov-report=term --cov-report=html

      - name: Compute build tag
        id: meta
        run: |
          TS=$(date +%Y%m%d-%H%M%S)
          echo "tag=${TS}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Save build information
        run: |
          echo "Repository: $GITHUB_REPOSITORY" > build-info.txt
          echo "Event: $GITHUB_EVENT_NAME" >> build-info.txt
          echo "Actor: $GITHUB_ACTOR" >> build-info.txt
          echo "Commit: $GITHUB_SHA" >> build-info.txt
          echo "Build tag: ${{ steps.meta.outputs.tag }}" >> build-info.txt

      - name: Upload build info artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-info
          path: build-info.txt

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  package:
    name: Package application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show received build tag
        run: |
          echo "Build tag received from test job: ${{ needs.test.outputs.build_tag }}"

      - name: Create distribution package
        run: |
          mkdir -p dist
          cp hello.py dist/
          cp requirements.txt dist/
          zip -r "app-${{ needs.test.outputs.build_tag }}.zip" dist
          mv "app-${{ needs.test.outputs.build_tag }}.zip" dist/

      - name: Upload application package
        uses: actions/upload-artifact@v4
        with:
          name: app-zip
          path: dist/*.zip

  docs:
    name: Generate documentation summary
    runs-on: ubuntu-latest
    needs: [test, package]

    steps:
      - name: Generate docs summary
        run: |
          mkdir -p docs
          echo "# DevOps Lab Documentation" > docs/docs-summary.md
          echo "" >> docs/docs-summary.md
          echo "Repository: $GITHUB_REPOSITORY" >> docs/docs-summary.md
          echo "Event: $GITHUB_EVENT_NAME" >> docs/docs-summary.md
          echo "Runner OS: $RUNNER_OS" >> docs/docs-summary.md
          echo "Build tag: ${{ needs.test.outputs.build_tag }}" >> docs/docs-summary.md
          echo "" >> docs/docs-summary.md
          echo "Jobs executed: test, package, docs" >> docs/docs-summary.md

      - name: Show docs summary
        run: cat docs/docs-summary.md

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-summary
          path: docs/docs-summary.md